<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Mobile UC - ISM Game Store</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#07080f;
color:white;
text-align:center;
}

/* HEADER */

.header{
padding:100px 20px 40px;
}

.header h1{
color:#00f7ff;
font-size:40px;
}

.notice{
background:#111827;
padding:15px;
border-radius:10px;
width:90%;
max-width:500px;
margin:20px auto;
color:#00f7ff;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
width:90%;
max-width:900px;
margin:auto;
padding-bottom:60px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 30px rgba(0,255,255,0.5);
}

.card h3{
margin-bottom:10px;
}

.price{
color:#00f7ff;
font-size:18px;
margin:10px 0;
}

/* BUTTON */

button{
background:#00f7ff;
border:none;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

/* MESSENGER */

.messenger{
position:fixed;
bottom:25px;
right:25px;
background:#0084ff;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
font-size:28px;
color:white;
box-shadow:0 0 40px rgba(0,132,255,0.9);
}

</style>
</head>

<body>

<div class="header">

<h1>PUBG Mobile UC Global</h1>

<div class="notice">
⚠️ Top-Up is done using your PUBG Player ID
</div>

</div>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">5 DT</div>
<button onclick="order('60 UC')">Order</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">18 DT</div>
<button onclick="order('325 UC')">Order</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">35 DT</div>
<button onclick="order('660 UC')">Order</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">88 DT</div>
<button onclick="order('1800 UC')">Order</button>
</div>

<div class="card">
<h3>3850 UC</h3>
<div class="price">175 DT</div>
<button onclick="order('3850 UC')">Order</button>
</div>

<div class="card">
<h3>8100 UC</h3>
<div class="price">333 DT</div>
<button onclick="order('8100 UC')">Order</button>
</div>

</div>

<a class="messenger" href="https://m.me/61555974173704" target="_blank">💬</a>

<script>

function order(pack){

let message =
"PUBG Mobile UC Order:%0A" +
"Pack: " + pack + "%0A" +
"Player ID: ";

window.location.href =
"https://m.me/61555974173704?text=" + message;

}

</script>

</body>
</html>
